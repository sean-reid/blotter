[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log

[unix_http_server]
file=/var/run/supervisor.sock

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

; ---------- redis ----------
[program:redis]
command=redis-server --save "" --appendonly no --requirepass %(ENV_REDIS_PASSWORD)s
autorestart=true
stdout_logfile=/var/log/redis-stdout.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=2
stderr_logfile=/var/log/redis-stderr.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=2
priority=10

; ---------- clickhouse ----------
; --no-daemon keeps it in foreground so supervisord can manage it
[program:clickhouse]
command=clickhouse-server --config-file=/etc/clickhouse-server/config.xml
autorestart=true
stdout_logfile=/var/log/clickhouse-stdout.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=2
stderr_logfile=/var/log/clickhouse-stderr.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=2
priority=20
startsecs=5

; ---------- cloudflared ----------
[program:cloudflared]
command=cloudflared tunnel --config /workspace/blotter/infra/cloudflared/config.yml run
autorestart=true
stdout_logfile=/var/log/cloudflared-stdout.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=2
stderr_logfile=/var/log/cloudflared-stderr.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=2
priority=30

; ---------- pipeline ----------
; Depends on redis + clickhouse being up. priority=40 starts it last.
; startsecs=0 avoids marking short-lived retries as FATAL.
[program:pipeline]
command=uv run blotter stream start
directory=/workspace/blotter/backend
environment=PATH="/root/.local/bin:%(ENV_PATH)s",GOOGLE_APPLICATION_CREDENTIALS="/workspace/blotter-gcs-key.json",REDIS_PASSWORD="%(ENV_REDIS_PASSWORD)s"
autorestart=true
stdout_logfile=/var/log/blotter-pipeline.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=3
stderr_logfile=/var/log/blotter-pipeline-err.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=2
priority=40
startsecs=10
startretries=999

; ---------- staging pipeline (OpenMHz) ----------
; Runs alongside production pipeline using separate ClickHouse DB and Redis DB.
; autostart=false — start manually with: supervisorctl start staging-pipeline
[program:staging-pipeline]
command=uv run blotter stream start --openmhz
directory=/workspace/blotter/backend
environment=PATH="/root/.local/bin:%(ENV_PATH)s",GOOGLE_APPLICATION_CREDENTIALS="/workspace/blotter-gcs-key.json",REDIS_PASSWORD="%(ENV_REDIS_PASSWORD)s",CLICKHOUSE_DATABASE="blotter_staging",REDIS_DB="1",STREAM_AD_SKIP_SECONDS="0",OPENMHZ_SYSTEMS="lapdvalley,lapdwest"
autorestart=true
autostart=false
stdout_logfile=/var/log/blotter-staging-pipeline.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=3
stderr_logfile=/var/log/blotter-staging-pipeline-err.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=2
priority=50
startsecs=10
startretries=999
